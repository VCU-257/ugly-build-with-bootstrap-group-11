<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog / Reviews</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="vh-100 d-flex flex-column overflow-hidden">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-light border-bottom">
    <div class="container-fluid">
      <div class="navbar-collapse">
        <ul class="navbar-nav me-auto mb-0">
          <li class="nav-item">
            <a class="nav-link fw-bold" href="index.html">HOME</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="catalog.html">CATALOG</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="wishlist.html">WISHLIST</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#deals">DEALS</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('sidebar').classList.toggle('d-none')">
            <i class="bi bi-layout-sidebar"></i> Filters
          </button>
          <div class="input-group">
            <button class="btn btn-outline-secondary">
              <i class="bi bi-search"></i>
            </button>
            <input type="text" class="form-control" placeholder="search">
          </div>
          <a class="btn btn-outline-secondary rounded-circle" href="Cart.html" aria-label="Cart">
            <i class="bi bi-cart"></i>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="d-flex flex-grow-1 overflow-hidden">

    <!-- Sidebar -->
    <div id="sidebar" class="p-3 bg-secondary-subtle overflow-y-auto" style="width: 180px; min-width: 180px;">
      <div class="fw-bold mb-2">Catalog/Reviews</div>
      <div class="d-flex align-items-center mb-3">
        <span class="me-1">&#9663;</span>
        <span class="fw-semibold">Filters</span>
      </div>
      <div class="d-flex flex-column gap-2">
        <div class="bg-secondary rounded" style="height: 14px;"></div>
        <div class="bg-secondary rounded" style="height: 14px;"></div>
        <div class="bg-secondary rounded" style="height: 14px;"></div>
        <div class="bg-secondary rounded" style="height: 14px;"></div>
        <div class="bg-secondary rounded" style="height: 14px;"></div>
        <div class="bg-secondary rounded" style="height: 14px;"></div>
        <div class="bg-secondary rounded" style="height: 14px;"></div>
        <div class="bg-secondary rounded" style="height: 14px;"></div>
      </div>
    </div>

    <!-- Main -->
    <div class="p-3 flex-grow-1 overflow-y-auto">

      <!-- Product summary card -->
      <div class="d-flex gap-3 mb-4 p-3 bg-light rounded-3">
        <div class="bg-secondary rounded d-flex align-items-center justify-content-center text-white flex-shrink-0" style="width: 160px; height: 130px;">Picture</div>
        <div class="d-flex flex-column justify-content-center">
          <div class="fw-bold fs-5 mb-2">Name of the product</div>
          <div class="fst-italic text-muted mb-2">Description</div>
          <hr class="my-1">
          <hr class="my-1">
        </div>
      </div>

      <!-- Reviews section -->
      <div class="fw-bold fs-5 mb-3">Reviews</div>

      <div class="d-flex gap-3 mb-4">
        <div class="bg-secondary rounded-circle flex-shrink-0" style="width: 44px; height: 44px;"></div>
        <div class="flex-grow-1">
          <div class="text-secondary fs-5 mb-1">
            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
          </div>
          <div class="bg-light border rounded p-3" style="min-height: 100px;">Customer reviews</div>
        </div>
      </div>

      <div class="d-flex gap-3 mb-4">
        <div class="bg-secondary rounded-circle flex-shrink-0" style="width: 44px; height: 44px;"></div>
        <div class="flex-grow-1">
          <div class="text-secondary fs-5 mb-1">
            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
          </div>
          <div class="bg-light border rounded p-3" style="min-height: 100px;">Customer reviews</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom bar -->
  <div class="d-flex gap-3 p-3 bg-secondary-subtle border-top">
    <button class="btn btn-outline-secondary flex-grow-1 rounded-pill">Buy Now</button>
    <button class="btn btn-outline-secondary flex-grow-1 rounded-pill">Add to Cart</button>
    <button class="btn btn-outline-secondary flex-grow-1 rounded-pill">Wishlist</button>
    <button class="btn btn-outline-secondary flex-grow-1 rounded-pill">Write Review</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
