<main class="col-md-9 p-4">
  <div class="row mb-4">
    <div class="col-12 text-center">
      <div class="card bg-light p-3 mb-2">
        <img src="https://via.placeholder.com/600x400" class="img-fluid rounded" alt="Main Product">
      </div>
      <div class="d-flex justify-content-center gap-2">
        <img src="https://via.placeholder.com/80" class="img-thumbnail" alt="Thumb 1">
        <img src="https://via.placeholder.com/80" class="img-thumbnail" alt="Thumb 2">
        <img src="https://via.placeholder.com/80" class="img-thumbnail" alt="Thumb 3">
      </div>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-header fw-bold">Description</div>
    <div class="card-body">
      <p class="card-text">This is where the detailed product description goes, utilizing the Bootstrap Card component for structure.</p>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-header fw-bold">Specifications</div>
    <div class="card-body">
      <ul class="list-group list-group-flush">
        <li class="list-group-item">Weight: 1.2kg</li>
        <li class="list-group-item">Dimensions: 10x20x5 cm</li>
        <li class="list-group-item">Material: High-grade Plastic</li>
      </ul>
    </div>
  </div>
  
  <div class="d-flex gap-2">
    <button class="btn btn-secondary flex-grow-1">Reviews</button>
    <button class="btn btn-primary flex-grow-1">Add to Cart</button>
    <button class="btn btn-success flex-grow-1">Buy Now</button>
    <button class="btn btn-outline-secondary flex-grow-1">Wishlist</button>
  </div>
</main>
