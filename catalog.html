<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { overflow: hidden; height: 100vh; }
    #sidebar { width: 180px; min-width: 180px; background: #ccc; height: 100vh; overflow-y: auto; }
    #main { flex: 1; height: 100vh; overflow-y: auto; }
    .filter-bar { background: #aaa; height: 14px; border-radius: 4px; }
    .product-placeholder { background: #999; border-radius: 8px; height: 150px; }
    .banner-placeholder { background: #ddd; border-radius: 8px; height: 120px; }
    .scrollbar-track { width: 10px; background: #ccc; }
    .scrollbar-thumb { width: 10px; height: 40px; background: #999; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="d-flex">

    <!-- Sidebar -->
    <div id="sidebar" class="p-3">
      <div class="fw-bold mb-2">Catalog</div>
      <div class="d-flex align-items-center mb-3">
        <span class="me-1">&#9663;</span>
        <span class="fw-semibold">FILTERS</span>
      </div>
      <div class="d-flex flex-column gap-2">
        <div class="filter-bar"></div>
        <div class="filter-bar"></div>
        <div class="filter-bar"></div>
        <div class="filter-bar"></div>
        <div class="filter-bar"></div>
        <div class="filter-bar"></div>
        <div class="filter-bar"></div>
      </div>
    </div>

    <!-- Main content -->
    <div id="main" class="p-3">

      <!-- Top nav -->
      <div class="d-flex align-items-center gap-3 mb-4">
        <span class="fw-bold">HOME</span>
        <div class="input-group" style="max-width: 400px;">
          <span class="input-group-text"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.868-3.833zm-5.242 1.156a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/></svg></span>
          <input type="text" class="form-control" placeholder="SEARCH">
        </div>
        <button class="btn btn-outline-secondary ms-auto">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3H.5A.5.5 0 0 1 0 2.5zM5 12a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-2-1h9.14l1.313-7H3.359zM8.5 14a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg>
        </button>
      </div>

      <!-- Deals heading -->
      <h5 class="text-center text-decoration-underline mb-3">Our Deals</h5>

      <!-- Banner -->
      <div class="banner-placeholder mb-4"></div>

      <!-- Product grid -->
      <div class="row g-3">
        <div class="col-4"><div class="product-placeholder"></div></div>
        <div class="col-4"><div class="product-placeholder"></div></div>
        <div class="col-4"><div class="product-placeholder"></div></div>
        <div class="col-4"><div class="product-placeholder"></div></div>
        <div class="col-4"><div class="product-placeholder"></div></div>
        <div class="col-4"><div class="product-placeholder"></div></div>
      </div>

    </div>

  </div>
</body>
</html>
