<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-light border-bottom">
    <div class="container-fluid">
      <div class="navbar-collapse">
        <ul class="navbar-nav me-auto mb-0">
          <li class="nav-item">
            <a class="nav-link" href="index.html">HOME</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="catalog.html">CATALOG</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="wishlist.html">WISHLIST</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="catalog.html#deals">DEALS</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <form class="input-group" action="catalog.html" method="get">
            <button class="btn btn-outline-secondary" type="submit">
              <i class="bi bi-search"></i>
            </button>
            <input type="text" name="q" class="form-control" placeholder="search">
          </form>
          <a class="btn btn-outline-secondary rounded-circle" href="Cart.html" aria-label="Cart">
            <i class="bi bi-cart"></i>
          </a>
          <button class="btn btn-outline-secondary rounded-circle" aria-label="Close">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="container mt-4 flex-grow-1">
    <h3 class="mb-3">Checkout</h3>

    <div class="row g-4">
      <div class="col-12 col-lg-7">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title mb-3">Shipping information</h5>
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label">First name</label>
                <input class="form-control" type="text" placeholder="First name">
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Last name</label>
                <input class="form-control" type="text" placeholder="Last name">
              </div>
              <div class="col-12">
                <label class="form-label">Address</label>
                <input class="form-control" type="text" placeholder="Street address">
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">City</label>
                <input class="form-control" type="text" placeholder="City">
              </div>
              <div class="col-12 col-md-3">
                <label class="form-label">State</label>
                <input class="form-control" type="text" placeholder="State">
              </div>
              <div class="col-12 col-md-3">
                <label class="form-label">Zip</label>
                <input class="form-control" type="text" placeholder="Zip">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-5">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title mb-3">Order summary</h5>
            <div class="d-flex justify-content-between">
              <span>Items</span>
              <span>$500</span>
            </div>
            <div class="d-flex justify-content-between">
              <span>Shipping</span>
              <span>$0</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between fw-bold">
              <span>Total</span>
              <span>$500</span>
            </div>
            <div class="d-grid mt-3">
              <button class="btn btn-success btn-lg">Place order</button>
            </div>
            <a class="btn btn-link mt-2 p-0" href="Cart.html">Back to cart</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-secondary text-white mt-auto">
    <div class="container py-3">
      <div class="d-flex gap-4">
        <p class="mb-0">Customer Service</p>
        <p class="mb-0">Privacy Policy</p>
        <p class="mb-0">About US</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
